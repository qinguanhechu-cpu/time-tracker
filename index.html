<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>时间块记录</title>
<style>
  :root {
    --bg: #f0f2f5;
    --card-bg: #ffffff;
    --text: #1a1a1a;
    --text-light: #8c8c8c;
    --border: #e8e8e8;
    --primary: #4a6cf7;
    --primary-light: rgba(74,108,247,0.08);
    --hover: #f5f5f5;
    --shadow: 0 1px 4px rgba(0,0,0,0.06);
    --shadow-lg: 0 4px 16px rgba(0,0,0,0.1);
    --radius: 10px;
    --sleep-bg: #e8ecf4;
    --sleep-text: #9ca3af;
    --drag-highlight: rgba(74,108,247,0.15);
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
  }

  .container {
    max-width: 680px;
    margin: 0 auto;
    padding: 16px;
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 16px;
  }

  .header-left {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  h1 {
    font-size: 1.35rem;
    font-weight: 700;
    letter-spacing: -0.3px;
    color: var(--text);
  }

  .user-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.75rem;
    color: var(--text-light);
  }

  .user-name {
    font-weight: 600;
    color: var(--primary);
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 4px;
    transition: background 0.15s;
  }

  .user-name:hover {
    background: var(--primary-light);
  }

  .sync-status {
    font-size: 0.7rem;
    color: var(--text-light);
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .sync-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #52c41a;
    display: inline-block;
  }

  .sync-dot.offline { background: #faad14; }
  .sync-dot.error { background: #ff4d4f; }

  .date-nav {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--card-bg);
    border-radius: var(--radius);
    padding: 4px;
    box-shadow: var(--shadow);
  }

  .date-nav button {
    background: transparent;
    border: none;
    border-radius: 6px;
    padding: 6px 10px;
    cursor: pointer;
    font-size: 0.85rem;
    color: var(--text);
    transition: all 0.15s;
  }

  .date-nav button:hover {
    background: var(--primary-light);
    color: var(--primary);
  }

  .date-nav .current-date {
    font-weight: 600;
    min-width: 110px;
    text-align: center;
    font-size: 0.85rem;
    padding: 0 4px;
  }

  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 16px;
  }

  .stat-card {
    background: var(--card-bg);
    border-radius: var(--radius);
    padding: 12px 14px;
    box-shadow: var(--shadow);
    text-align: center;
  }

  .stat-card .label {
    font-size: 0.7rem;
    color: var(--text-light);
    letter-spacing: 0.3px;
  }

  .stat-card .value {
    font-size: 1.3rem;
    font-weight: 700;
    margin-top: 2px;
    color: var(--primary);
  }

  .actions {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }

  .actions button {
    flex: 1;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: var(--radius);
    padding: 10px 12px;
    cursor: pointer;
    font-size: 0.8rem;
    font-weight: 500;
    transition: all 0.2s;
  }

  .actions button:hover { opacity: 0.9; transform: translateY(-1px); }
  .actions button:active { transform: translateY(0); }

  .actions button.secondary {
    background: var(--card-bg);
    color: var(--text);
    border: 1px solid var(--border);
  }

  .actions button.secondary:hover {
    border-color: var(--primary);
    color: var(--primary);
  }

  .actions button.danger {
    background: var(--card-bg);
    color: #ff4d4f;
    border: 1px solid #ffccc7;
  }

  /* Pie chart */
  .chart-card {
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 16px;
    margin-bottom: 16px;
  }

  .chart-card h3 {
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--text-light);
    margin-bottom: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .chart-container {
    display: flex;
    align-items: center;
    gap: 16px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .chart-canvas-wrap {
    position: relative;
    width: 140px;
    height: 140px;
    flex-shrink: 0;
  }

  .chart-canvas-wrap canvas {
    width: 100%;
    height: 100%;
  }

  .chart-center-text {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }

  .chart-center-text .hours {
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--text);
  }

  .chart-center-text .label {
    font-size: 0.7rem;
    color: var(--text-light);
  }

  .chart-legend {
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex: 1;
    min-width: 120px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.8rem;
  }

  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .legend-label {
    flex: 1;
    color: var(--text);
  }

  .legend-value {
    font-weight: 600;
    color: var(--text-light);
    font-size: 0.75rem;
  }

  .chart-empty {
    text-align: center;
    padding: 20px;
    color: var(--text-light);
    font-size: 0.85rem;
  }

  /* Sleep block */
  .sleep-block {
    background: var(--sleep-bg);
    border-radius: var(--radius);
    margin-bottom: 16px;
    overflow: hidden;
    box-shadow: var(--shadow);
    transition: all 0.2s;
  }

  .sleep-block.collapsed { cursor: pointer; }
  .sleep-block.collapsed:hover { box-shadow: var(--shadow-lg); }

  .sleep-header {
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .sleep-icon {
    font-size: 1.4rem;
    width: 40px;
    height: 40px;
    background: rgba(74,108,247,0.1);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .sleep-info { flex: 1; }
  .sleep-info .time-range { font-weight: 600; font-size: 0.9rem; }
  .sleep-info .sleep-label { font-size: 0.75rem; color: var(--text-light); }

  .sleep-toggle {
    font-size: 0.75rem;
    color: var(--primary);
    background: rgba(74,108,247,0.1);
    padding: 4px 10px;
    border-radius: 20px;
    flex-shrink: 0;
  }

  .sleep-block.collapsed .sleep-activities { display: none; }

  .sleep-activities {
    border-top: 1px solid rgba(0,0,0,0.05);
    padding: 8px 16px 12px;
  }

  /* Time blocks */
  .time-blocks {
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  .period-label {
    padding: 10px 16px;
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--text-light);
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .time-block {
    display: flex;
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
    min-height: 44px;
    user-select: none;
    -webkit-user-select: none;
  }

  .time-block:last-child { border-bottom: none; }
  .time-block:hover { background: var(--hover); }

  .time-block.dragging-over {
    background: var(--drag-highlight) !important;
  }

  .time-label {
    width: 56px;
    padding: 10px 8px;
    font-size: 0.75rem;
    color: var(--text-light);
    border-right: 1px solid var(--border);
    text-align: right;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    font-weight: 500;
  }

  .time-content {
    flex: 1;
    padding: 10px 12px;
    display: flex;
    align-items: center;
    cursor: pointer;
    min-height: 44px;
    transition: all 0.15s;
  }

  .time-content.empty { color: #d9d9d9; }
  .time-content.empty::after { content: "+"; font-size: 1.1rem; }
  .time-content.empty:hover { background: var(--primary-light); }

  .time-content.filled {
    border-left: 3px solid var(--block-color, var(--primary));
    background: var(--block-bg, var(--primary-light));
  }

  .time-content .activity {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
    overflow: hidden;
  }

  .time-content .activity-text {
    flex: 1;
    font-size: 0.85rem;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .time-content .activity-note {
    font-size: 0.7rem;
    color: var(--text-light);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100px;
  }

  .time-content .edit-btn {
    background: none;
    border: none;
    color: var(--text-light);
    cursor: pointer;
    font-size: 0.75rem;
    padding: 4px 6px;
    border-radius: 4px;
    transition: all 0.15s;
    flex-shrink: 0;
  }

  .time-content .edit-btn:hover {
    background: rgba(0,0,0,0.05);
    color: var(--text);
  }

  /* Drag hint */
  .drag-hint {
    text-align: center;
    padding: 8px;
    font-size: 0.75rem;
    color: var(--text-light);
    background: var(--card-bg);
    border-radius: var(--radius);
    margin-bottom: 12px;
    box-shadow: var(--shadow);
  }

  .drag-hint span {
    color: var(--primary);
    font-weight: 500;
  }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 16px;
    backdrop-filter: blur(2px);
  }

  .modal-overlay.active { display: flex; }

  .modal {
    background: var(--card-bg);
    border-radius: 16px;
    padding: 24px;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    animation: modalIn 0.2s ease;
  }

  @keyframes modalIn {
    from { transform: scale(0.95); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .modal h2 {
    font-size: 1.05rem;
    margin-bottom: 4px;
    font-weight: 600;
  }

  .modal .time-hint {
    font-size: 0.8rem;
    color: var(--text-light);
    margin-bottom: 16px;
  }

  .modal input, .modal textarea {
    width: 100%;
    padding: 10px 14px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    font-size: 0.95rem;
    margin-bottom: 12px;
    font-family: inherit;
    transition: border-color 0.2s;
  }

  .modal textarea {
    resize: vertical;
    min-height: 60px;
  }

  .modal input:focus, .modal textarea:focus {
    outline: none;
    border-color: var(--primary);
  }

  .modal input::placeholder { color: #bbb; }

  .modal .color-picker {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 18px;
  }

  .modal .color-option {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    border: 2.5px solid transparent;
    cursor: pointer;
    transition: transform 0.15s;
  }

  .modal .color-option:hover { transform: scale(1.15); }

  .modal .color-option.selected {
    border-color: var(--text);
    box-shadow: 0 0 0 2px var(--card-bg);
  }

  .modal-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }

  .modal-actions button {
    padding: 8px 20px;
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 0.85rem;
    font-weight: 500;
    border: none;
    transition: all 0.15s;
  }

  .modal-actions .save { background: var(--primary); color: white; }
  .modal-actions .save:hover { opacity: 0.9; }
  .modal-actions .cancel { background: var(--hover); color: var(--text); }
  .modal-actions .cancel:hover { background: var(--border); }

  .modal-actions .delete {
    background: transparent;
    color: #ff4d4f;
    margin-right: auto;
    border: 1px solid #ffccc7;
  }

  .modal-actions .delete:hover { background: #fff2f0; }

  /* Login Modal */
  .login-modal .modal {
    max-width: 340px;
    text-align: center;
  }

  .login-modal .login-icon { font-size: 2.5rem; margin-bottom: 8px; }
  .login-modal .login-desc {
    font-size: 0.85rem;
    color: var(--text-light);
    margin-bottom: 20px;
    line-height: 1.6;
  }

  .login-modal input {
    text-align: center;
    font-size: 1.1rem;
    font-weight: 500;
    letter-spacing: 1px;
  }

  .login-modal .login-hint {
    font-size: 0.75rem;
    color: var(--text-light);
    margin-bottom: 16px;
  }

  .login-modal .login-btn {
    width: 100%;
    padding: 12px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: var(--radius);
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .login-modal .login-btn:hover { opacity: 0.9; }
  .login-modal .login-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #333;
    color: white;
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 0.85rem;
    z-index: 200;
    transition: transform 0.3s ease;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  #importInput { display: none; }

  .loading-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(255,255,255,0.8);
    z-index: 50;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 12px;
  }

  .loading-overlay.active { display: flex; }

  .spinner {
    width: 32px;
    height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 500px) {
    .container { padding: 12px; }
    h1 { font-size: 1.15rem; }
    header { flex-direction: column; align-items: flex-start; gap: 8px; }
    .date-nav { width: 100%; justify-content: center; }
    .stats { gap: 8px; }
    .stat-card { padding: 10px 8px; }
    .stat-card .value { font-size: 1.1rem; }
    .actions button { padding: 9px 8px; font-size: 0.75rem; }
    .time-label { width: 48px; font-size: 0.7rem; padding: 8px 6px; }
    .time-content { padding: 8px 10px; min-height: 40px; }
    .time-content .activity-text { font-size: 0.8rem; }
    .time-content .edit-btn { opacity: 1; padding: 4px; }
    .sleep-header { padding: 12px 14px; }
    .sleep-icon { width: 36px; height: 36px; font-size: 1.2rem; }
    .chart-container { flex-direction: column; align-items: center; }
    .chart-canvas-wrap { width: 120px; height: 120px; }
    .drag-hint { font-size: 0.7rem; padding: 6px; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="header-left">
      <h1>时间记录</h1>
      <div class="user-bar">
        <span class="sync-dot" id="syncDot"></span>
        <span id="syncText">连接中...</span>
        <span>|</span>
        <span>用户：</span>
        <span class="user-name" id="userName" title="点击切换用户">未登录</span>
      </div>
    </div>
    <div class="date-nav">
      <button id="prevDay">&lt;</button>
      <span class="current-date" id="currentDate"></span>
      <button id="nextDay">&gt;</button>
      <button id="todayBtn">今天</button>
    </div>
  </header>

  <div class="stats">
    <div class="stat-card">
      <div class="label">已记录</div>
      <div class="value" id="statRecorded">0h</div>
    </div>
    <div class="stat-card">
      <div class="label">空闲</div>
      <div class="value" id="statEmpty">24h</div>
    </div>
    <div class="stat-card">
      <div class="label">活动数</div>
      <div class="value" id="statActivities">0</div>
    </div>
  </div>

  <div class="chart-card" id="chartCard">
    <h3>今日时间分布</h3>
    <div id="chartContent">
      <div class="chart-empty">记录一些活动后，这里会显示时间分布</div>
    </div>
  </div>

  <div class="drag-hint">
    <span>提示：</span>按住一个时间块并拖动，可批量选中多个时段统一记录
  </div>

  <div class="actions">
    <button class="secondary" id="exportBtn">导出</button>
    <button class="secondary" id="importBtn">导入</button>
    <button class="danger" id="clearBtn">清空</button>
  </div>

  <div class="sleep-block collapsed" id="sleepBlock">
    <div class="sleep-header" id="sleepHeader">
      <div class="sleep-icon">&#127769;</div>
      <div class="sleep-info">
        <div class="time-range">02:00 - 08:00</div>
        <div class="sleep-label">睡眠时段</div>
      </div>
      <div class="sleep-toggle">展开</div>
    </div>
    <div class="sleep-activities" id="sleepActivities"></div>
  </div>

  <div class="time-blocks" id="timeBlocks"></div>
</div>

<!-- Activity Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2 id="modalTitle">编辑时间块</h2>
    <div class="time-hint" id="timeHint"></div>
    <input type="text" id="activityInput" placeholder="输入你做了什么..." maxlength="100" autocomplete="off">
    <textarea id="noteInput" placeholder="备注（可选）" maxlength="500"></textarea>
    <div class="color-picker" id="colorPicker"></div>
    <div class="modal-actions">
      <button class="delete" id="deleteBtn">删除</button>
      <button class="cancel" id="cancelBtn">取消</button>
      <button class="save" id="saveBtn">保存</button>
    </div>
  </div>
</div>

<!-- Login Modal -->
<div class="modal-overlay login-modal" id="loginModal">
  <div class="modal">
    <div class="login-icon">&#128274;</div>
    <h2>设置用户名</h2>
    <p class="login-desc">输入一个用户名，用于在多台设备间同步数据。<br>在同一设备上输入相同的用户名即可看到相同的数据。</p>
    <input type="text" id="usernameInput" placeholder="输入用户名" maxlength="20" autocomplete="off">
    <p class="login-hint">用户名区分大小写，仅限字母、数字和下划线</p>
    <button class="login-btn" id="loginBtn">开始使用</button>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <div style="font-size:0.85rem;color:var(--text-light)">同步数据中...</div>
</div>
<input type="file" id="importInput" accept=".json">

<script type="module">
import { initializeApp } from "https://cdn.jsdelivr.net/npm/@firebase/app@0.10.5/+esm";
import { getFirestore, doc, setDoc, onSnapshot } from "https://cdn.jsdelivr.net/npm/@firebase/firestore@4.6.4/+esm";

const firebaseConfig = {
  apiKey: "AIzaSyBds0R-1ks9VZnO6iEUM-el94E77dzHEWU",
  authDomain: "time-tracker-a9acb.firebaseapp.com",
  projectId: "time-tracker-a9acb",
  storageBucket: "time-tracker-a9acb.firebasestorage.app",
  messagingSenderId: "843669525828",
  appId: "1:843669525828:web:ff62cd807fbad05000b311",
  measurementId: "G-F531WV6NL4"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Color labels for the legend
const COLOR_LABELS = {
  '#50c878': '工作',
  '#4a6cf7': '交通',
  '#9775fa': '娱乐',
  '#ff6b6b': '学习',
  '#ffd43b': '输出',
  '#ffa94d': '生活',
  '#f06595': '运动',
  '#3bc9db': '休息',
  '#69db7c': '阅读',
  '#e599f7': '社交',
  '#74c0fc': '其他',
  '#ff8787': '饮食'
};

const SLEEP_START = 2;
const SLEEP_END = 8;

let currentDate = new Date();
let dayData = {};
let editingSlots = [];
let isSleepExpanded = false;
let currentUser = '';
let unsubscribe = null;

// Drag state
let isDragging = false;
let dragStartSlot = null;
let dragSlots = new Set();
let dragJustEnded = false;
let dragStartPosition = null;
const DRAG_THRESHOLD = 8; // pixels

function getDateKey(date) { return date.toISOString().split('T')[0]; }

function formatDate(date) {
  const weekdays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, '0');
  const d = String(date.getDate()).padStart(2, '0');
  const w = weekdays[date.getDay()];
  return `${y}-${m}-${d} ${w}`;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function setSyncStatus(status, text) {
  const dot = document.getElementById('syncDot');
  const txt = document.getElementById('syncText');
  dot.className = 'sync-dot';
  dot.style.background = status === 'online' ? '#52c41a' : status === 'offline' ? '#faad14' : '#ff4d4f';
  txt.textContent = text;
}

function showLoading(show) {
  document.getElementById('loading').classList.toggle('active', show);
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

function isValidUsername(name) { return /^[a-zA-Z0-9_]{1,20}$/.test(name); }

function showLoginModal() {
  document.getElementById('loginModal').classList.add('active');
  setTimeout(() => document.getElementById('usernameInput').focus(), 150);
}

function hideLoginModal() { document.getElementById('loginModal').classList.remove('active'); }

function doLogin(username) {
  username = username.trim().toLowerCase();
  if (!isValidUsername(username)) {
    showToast('用户名只能包含字母、数字和下划线');
    return;
  }
  currentUser = username;
  localStorage.setItem('tt_username', username);
  document.getElementById('userName').textContent = username;
  hideLoginModal();
  connectToFirebase(username);
}

function switchUser() {
  if (unsubscribe) { unsubscribe(); unsubscribe = null; }
  dayData = {};
  currentUser = '';
  localStorage.removeItem('tt_username');
  document.getElementById('userName').textContent = '未登录';
  setSyncStatus('offline', '未连接');
  renderAll();
  showLoginModal();
}

function connectToFirebase(username) {
  if (unsubscribe) { unsubscribe(); unsubscribe = null; }
  const dataRef = doc(db, 'timeData', username);
  setSyncStatus('online', '连接中...');
  unsubscribe = onSnapshot(dataRef, (snap) => {
    dayData = snap.exists() ? snap.data() : {};
    setSyncStatus('online', '已同步');
    renderAll();
  }, (error) => {
    console.error('Firebase error:', error);
    setSyncStatus('error', '同步失败');
    loadLocalData();
    renderAll();
  });
}

function loadLocalData() {
  const stored = localStorage.getItem('timeTrackerData');
  if (stored) {
    try {
      const allData = JSON.parse(stored);
      dayData = allData[getDateKey(currentDate)] || {};
    } catch (e) { dayData = {}; }
  }
}

async function saveToFirebase() {
  try {
    await setDoc(doc(db, 'timeData', currentUser), dayData);
    saveToLocal();
  } catch (e) {
    console.error('Save error:', e);
    saveToLocal();
    showToast('云端保存失败，已存本地');
  }
}

function saveToLocal() {
  let allData = {};
  const stored = localStorage.getItem('timeTrackerData');
  if (stored) { try { allData = JSON.parse(stored); } catch (e) {} }
  allData[getDateKey(currentDate)] = dayData;
  localStorage.setItem('timeTrackerData', JSON.stringify(allData));
}

function renderAll() {
  renderPieChart();
  renderSleepBlock();
  renderTimeBlocks();
  updateStats();
  setupDragListeners(document.getElementById('sleepActivities'));
}

// ===== PIE CHART =====
function renderPieChart() {
  const container = document.getElementById('chartContent');
  const entries = [];

  for (let i = 0; i < 24; i++) {
    if (dayData[i] && dayData[i].text) entries.push(dayData[i]);
    if (dayData[i + '.5'] && dayData[i + '.5'].text) entries.push(dayData[i + '.5']);
  }

  if (entries.length === 0) {
    container.innerHTML = '<div class="chart-empty">记录一些活动后，这里会显示时间分布</div>';
    return;
  }

  // Group by color
  const colorMap = {};
  entries.forEach(e => {
    const c = e.color || '#4a6cf7';
    if (!colorMap[c]) colorMap[c] = { count: 0, label: COLOR_LABELS[c] || '其他' };
    colorMap[c].count++;
  });

  const total = entries.length;
  const recordedHours = (total * 0.5);

  // Build legend HTML
  let legendHTML = '';
  const sorted = Object.entries(colorMap).sort((a, b) => b[1].count - a[1].count);
  sorted.forEach(([color, info]) => {
    const hours = (info.count * 0.5);
    const pct = Math.round(info.count / total * 100);
    legendHTML += `
      <div class="legend-item">
        <span class="legend-dot" style="background:${color}"></span>
        <span class="legend-label">${info.label}</span>
        <span class="legend-value">${hours % 1 === 0 ? hours : hours.toFixed(1)}h (${pct}%)</span>
      </div>
    `;
  });

  container.innerHTML = `
    <div class="chart-container">
      <div class="chart-canvas-wrap">
        <canvas id="pieCanvas" width="280" height="280"></canvas>
        <div class="chart-center-text">
          <div class="hours">${recordedHours % 1 === 0 ? recordedHours : recordedHours.toFixed(1)}h</div>
          <div class="label">已记录</div>
        </div>
      </div>
      <div class="chart-legend">${legendHTML}</div>
    </div>
  `;

  // Draw pie chart
  requestAnimationFrame(() => drawPieChart(sorted, total));
}

function drawPieChart(sorted, total) {
  const canvas = document.getElementById('pieCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const w = canvas.width;
  const h = canvas.height;
  const cx = w / 2;
  const cy = h / 2;
  const outerR = Math.min(cx, cy) - 4;
  const innerR = outerR * 0.55;

  ctx.clearRect(0, 0, w, h);

  let startAngle = -Math.PI / 2;
  const gap = 0.02;

  sorted.forEach(([color, info]) => {
    const sliceAngle = (info.count / total) * Math.PI * 2;
    if (sliceAngle < 0.01) return;

    ctx.beginPath();
    ctx.arc(cx, cy, outerR, startAngle + gap / 2, startAngle + sliceAngle - gap / 2);
    ctx.arc(cx, cy, innerR, startAngle + sliceAngle - gap / 2, startAngle + gap / 2, true);
    ctx.closePath();
    ctx.fillStyle = color;
    ctx.fill();

    startAngle += sliceAngle;
  });
}

// ===== SLEEP BLOCK =====
function renderSleepBlock() {
  const block = document.getElementById('sleepBlock');
  const activitiesDiv = document.getElementById('sleepActivities');
  const toggle = block.querySelector('.sleep-toggle');

  block.classList.toggle('collapsed', !isSleepExpanded);
  toggle.textContent = isSleepExpanded ? '收起' : '展开';

  let filledCount = 0;
  for (let i = SLEEP_START; i < SLEEP_END; i++) {
    if (dayData[i] && dayData[i].text) filledCount++;
    if (dayData[i + '.5'] && dayData[i + '.5'].text) filledCount++;
  }

  const sleepLabel = block.querySelector('.sleep-label');
  const totalSlots = (SLEEP_END - SLEEP_START) * 2;
  if (filledCount === 0) {
    sleepLabel.textContent = '睡眠时段 · 点击展开记录';
  } else if (filledCount === totalSlots) {
    sleepLabel.textContent = `睡眠时段 · 已全部记录 (${SLEEP_END - SLEEP_START}小时)`;
  } else {
    sleepLabel.textContent = `睡眠时段 · 已记录 ${filledCount}/${totalSlots} 个时段`;
  }

  activitiesDiv.innerHTML = '';
  for (let i = SLEEP_START; i < SLEEP_END; i++) {
    [{ slot: i, label: `${String(i).padStart(2,'0')}:00`, activity: dayData[i] },
     { slot: i + '.5', label: `${String(i).padStart(2,'0')}:30`, activity: dayData[i + '.5'] }
    ].forEach(({ slot, label, activity }) => {
      const hasContent = activity && activity.text;
      const div = document.createElement('div');
      div.className = 'time-block';
      div.innerHTML = `
        <div class="time-label">${label}</div>
        <div class="time-content ${hasContent ? 'filled' : 'empty'}" data-slot="${slot}" style="${hasContent ? `--block-color:${activity.color};--block-bg:${activity.color}15` : ''}">
          ${hasContent ? `<div class="activity"><span class="activity-text">${escapeHtml(activity.text)}</span>${activity.note ? `<span class="activity-note">${escapeHtml(activity.note)}</span>` : ''}<button class="edit-btn" data-slot="${slot}">&#9998;</button></div>` : ''}
        </div>`;
      activitiesDiv.appendChild(div);
    });
  }
}

// ===== TIME BLOCKS =====
function getSlotsInRange() {
  const periods = [
    { start: 8, end: 12 }, { start: 12, end: 18 },
    { start: 18, end: 24 }, { start: 0, end: 2 }
  ];
  const slots = [];
  periods.forEach(({ start, end }) => {
    for (let i = start; i < end; i++) {
      slots.push(i, i + '.5');
    }
  });
  return slots;
}

function slotToIndex(slot) {
  if (typeof slot === 'string' && slot.includes('.')) {
    return parseInt(slot) * 2 + 1;
  }
  return parseInt(slot) * 2;
}

function renderTimeBlocks() {
  const container = document.getElementById('timeBlocks');
  container.innerHTML = '';

  const periods = [
    { label: '上午', start: 8, end: 12 },
    { label: '下午', start: 12, end: 18 },
    { label: '晚上', start: 18, end: 24 },
    { label: '凌晨', start: 0, end: 2 }
  ];

  periods.forEach(({ label, start, end }) => {
    const header = document.createElement('div');
    header.className = 'period-label';
    header.textContent = label;
    container.appendChild(header);

    for (let i = start; i < end; i++) {
      [{ slot: i, label: `${String(i).padStart(2,'0')}:00`, activity: dayData[i] },
       { slot: i + '.5', label: `${String(i).padStart(2,'0')}:30`, activity: dayData[i + '.5'] }
      ].forEach(({ slot, label, activity }) => {
        const hasContent = activity && activity.text;
        const block = document.createElement('div');
        block.className = 'time-block';
        block.innerHTML = `
          <div class="time-label">${label}</div>
          <div class="time-content ${hasContent ? 'filled' : 'empty'}" data-slot="${slot}" style="${hasContent ? `--block-color:${activity.color};--block-bg:${activity.color}15` : ''}">
            ${hasContent ? `<div class="activity"><span class="activity-text">${escapeHtml(activity.text)}</span>${activity.note ? `<span class="activity-note">${escapeHtml(activity.note)}</span>` : ''}<button class="edit-btn" data-slot="${slot}">&#9998;</button></div>` : ''}
          </div>`;
        container.appendChild(block);
      });
    }
  });

  setupDragListeners(container);
}

function setupDragListeners(container) {
  const contents = container.querySelectorAll('.time-content');

  contents.forEach(el => {
    el.addEventListener('mousedown', (e) => {
      if (e.target.closest('.edit-btn')) return;
      dragStartPosition = { x: e.clientX, y: e.clientY };
      dragStartSlot = el.dataset.slot;
    });

    el.addEventListener('touchstart', (e) => {
      if (e.target.closest('.edit-btn')) return;
      const t = e.touches[0];
      dragStartPosition = { x: t.clientX, y: t.clientY };
      dragStartSlot = el.dataset.slot;
    }, { passive: true });
  });

  // Mouse move tracking for desktop drag
  document.addEventListener('mousemove', (e) => {
    if (!dragStartPosition || !dragStartSlot) return;
    const dx = e.clientX - dragStartPosition.x;
    const dy = e.clientY - dragStartPosition.y;
    if (Math.sqrt(dx * dx + dy * dy) < DRAG_THRESHOLD) return;

    if (!isDragging) {
      if (!currentUser) {
        showToast('请先登录');
        showLoginModal();
        dragStartPosition = null;
        dragStartSlot = null;
        return;
      }
      isDragging = true;
      dragSlots = new Set([dragStartSlot]);
      highlightDragSlots();
    }

    const el = document.elementFromPoint(e.clientX, e.clientY);
    if (el) {
      const content = el.closest('.time-content');
      if (content) updateDragSelection(content.dataset.slot);
    }
  });

  // Touch move tracking for mobile drag
  document.addEventListener('touchmove', (e) => {
    if (!dragStartPosition || !dragStartSlot) return;
    const t = e.touches[0];
    const dx = t.clientX - dragStartPosition.x;
    const dy = t.clientY - dragStartPosition.y;
    if (Math.sqrt(dx * dx + dy * dy) < DRAG_THRESHOLD) return;

    if (!isDragging) {
      if (!currentUser) {
        showToast('请先登录');
        showLoginModal();
        dragStartPosition = null;
        dragStartSlot = null;
        return;
      }
      isDragging = true;
      dragSlots = new Set([dragStartSlot]);
      highlightDragSlots();
    }

    const el = document.elementFromPoint(t.clientX, t.clientY);
    if (el) {
      const content = el.closest('.time-content');
      if (content) updateDragSelection(content.dataset.slot);
    }
  }, { passive: true });

  document.addEventListener('mouseup', endDrag);
  document.addEventListener('touchend', endDrag);
}

function updateDragSelection(currentSlot) {
  if (!isDragging || !dragStartSlot) return;

  const allSlots = getSlotsInRange();
  const startIdx = allSlots.indexOf(dragStartSlot);
  const currentIdx = allSlots.indexOf(currentSlot);

  if (startIdx === -1 || currentIdx === -1) return;

  const minIdx = Math.min(startIdx, currentIdx);
  const maxIdx = Math.max(startIdx, currentIdx);

  dragSlots = new Set();
  for (let i = minIdx; i <= maxIdx; i++) {
    dragSlots.add(allSlots[i]);
  }

  highlightDragSlots();
}

function highlightDragSlots() {
  document.querySelectorAll('.time-content').forEach(el => {
    el.classList.toggle('dragging-over', dragSlots.has(el.dataset.slot));
  });
}

function endDrag() {
  const wasDragging = isDragging;
  isDragging = false;

  if (wasDragging) {
    dragJustEnded = true;
    document.querySelectorAll('.dragging-over').forEach(el => el.classList.remove('dragging-over'));

    if (dragSlots.size > 0) {
      editingSlots = [...dragSlots];
      openModalForSlots(editingSlots);
    }

    setTimeout(() => { dragJustEnded = false; }, 100);
  }

  dragStartPosition = null;
  dragStartSlot = null;
  dragSlots = new Set();
}

function updateStats() {
  let filledCount = 0;
  for (let i = 0; i < 24; i++) {
    if (dayData[i] && dayData[i].text) filledCount++;
    if (dayData[i + '.5'] && dayData[i + '.5'].text) filledCount++;
  }
  const recordedHours = filledCount * 0.5;
  document.getElementById('statRecorded').textContent = recordedHours % 1 === 0 ? `${recordedHours}h` : `${recordedHours.toFixed(1)}h`;
  document.getElementById('statEmpty').textContent = `${(24 - recordedHours) % 1 === 0 ? (24 - recordedHours) : (24 - recordedHours).toFixed(1)}h`;
  document.getElementById('statActivities').textContent = filledCount;
}

function formatSlotTime(slot) {
  let hour, minute;
  if (typeof slot === 'string' && slot.includes('.')) {
    hour = parseInt(slot.split('.')[0]);
    minute = 30;
  } else {
    hour = parseInt(slot);
    minute = 0;
  }
  return `${String(hour).padStart(2, '0')}:${String(minute).toString().padStart(2, '0')}`;
}

function openModalForSlots(slots) {
  editingSlots = slots;

  const sorted = [...slots].sort((a, b) => slotToIndex(a) - slotToIndex(b));
  const startTime = formatSlotTime(sorted[0]);

  const lastSlot = sorted[sorted.length - 1];
  let endHour, endMinute;
  if (typeof lastSlot === 'string' && lastSlot.includes('.')) {
    endHour = parseInt(lastSlot.split('.')[0]);
    endMinute = 30;
  } else {
    endHour = parseInt(lastSlot);
    endMinute = 0;
  }
  const nextMinute = endMinute === 0 ? 30 : 0;
  const nextHour = endMinute === 0 ? endHour : endHour + 1;
  const endTime = `${String(nextHour).padStart(2, '0')}:${String(nextMinute).toString().padStart(2, '0')}`;

  document.getElementById('modalTitle').textContent = slots.length > 1 ? `批量编辑 (${slots.length}个时段)` : '编辑时间块';
  document.getElementById('timeHint').textContent = `${startTime} - ${endTime}`;

  // Pre-fill with first slot's data if exists
  const firstActivity = dayData[sorted[0]];
  document.getElementById('activityInput').value = firstActivity ? firstActivity.text : '';
  document.getElementById('noteInput').value = firstActivity ? (firstActivity.note || '') : '';
  document.getElementById('deleteBtn').style.display = slots.length === 1 && firstActivity && firstActivity.text ? 'block' : 'none';

  renderColorPicker(firstActivity ? firstActivity.color : null);
  document.getElementById('modal').classList.add('active');
  setTimeout(() => {
    const input = document.getElementById('activityInput');
    input.focus();
    input.select();
  }, 150);
}

function renderColorPicker(selected) {
  const picker = document.getElementById('colorPicker');
  picker.innerHTML = COLORS.map(c =>
    `<div class="color-option ${c === selected ? 'selected' : ''}" style="background:${c}" data-color="${c}" title="${COLOR_LABELS[c] || ''}"></div>`
  ).join('');

  picker.querySelectorAll('.color-option').forEach(el => {
    el.addEventListener('click', () => {
      picker.querySelectorAll('.color-option').forEach(e => e.classList.remove('selected'));
      el.classList.add('selected');
    });
  });
}

function closeModal() {
  document.getElementById('modal').classList.remove('active');
  editingSlots = [];
}

function saveActivity() {
  const text = document.getElementById('activityInput').value.trim();
  const note = document.getElementById('noteInput').value.trim();
  const selectedColor = document.querySelector('#colorPicker .color-option.selected');
  const color = selectedColor ? selectedColor.dataset.color : '#4a6cf7';

  if (!text) {
    showToast('请输入活动内容');
    return;
  }

  editingSlots.forEach(slot => {
    dayData[slot] = { text, note, color };
  });

  showLoading(true);
  saveToFirebase().then(() => {
    showLoading(false);
    renderAll();
    closeModal();
    showToast(`已保存 ${editingSlots.length} 个时段`);
  }).catch(() => {
    showLoading(false);
    renderAll();
    closeModal();
    showToast('已保存');
  });
}

function deleteActivity() {
  if (editingSlots.length !== 1) return;
  delete dayData[editingSlots[0]];
  showLoading(true);
  saveToFirebase().then(() => {
    showLoading(false);
    renderAll();
    closeModal();
    showToast('已删除');
  }).catch(() => {
    showLoading(false);
    renderAll();
    closeModal();
    showToast('已删除');
  });
}

function exportData() {
  const blob = new Blob([JSON.stringify(dayData, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `time-tracker-${getDateKey(currentDate)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('已导出');
}

function importData(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const imported = JSON.parse(e.target.result);
      dayData = { ...dayData, ...imported };
      saveToFirebase();
      renderAll();
      showToast('导入成功');
    } catch (err) {
      showToast('导入失败：文件格式错误');
    }
  };
  reader.readAsText(file);
}

function clearToday() {
  if (!currentUser) { showToast('请先登录'); return; }
  if (confirm('确定要清空今天的所有记录吗？')) {
    dayData = {};
    showLoading(true);
    saveToFirebase().then(() => {
      showLoading(false);
      renderAll();
      showToast('已清空');
    }).catch(() => {
      showLoading(false);
      renderAll();
      showToast('已清空');
    });
  }
}

// Sleep block toggle
document.getElementById('sleepHeader').addEventListener('click', (e) => {
  if (e.target.closest('.edit-btn') || e.target.closest('.time-content')) return;
  isSleepExpanded = !isSleepExpanded;
  renderSleepBlock();
});

// Click handlers for sleep activities
document.getElementById('sleepActivities').addEventListener('click', (e) => {
  if (dragJustEnded) return;
  const editBtn = e.target.closest('.edit-btn');
  if (editBtn) {
    e.stopPropagation();
    editingSlots = [editBtn.dataset.slot];
    openModalForSlots(editingSlots);
    return;
  }
  const content = e.target.closest('.time-content');
  if (content) {
    editingSlots = [content.dataset.slot];
    openModalForSlots(editingSlots);
  }
});

// Click handlers for time blocks
document.getElementById('timeBlocks').addEventListener('click', (e) => {
  if (dragJustEnded) return;
  const editBtn = e.target.closest('.edit-btn');
  if (editBtn) {
    e.stopPropagation();
    editingSlots = [editBtn.dataset.slot];
    openModalForSlots(editingSlots);
    return;
  }
  const content = e.target.closest('.time-content');
  if (content) {
    editingSlots = [content.dataset.slot];
    openModalForSlots(editingSlots);
  }
});

// Date navigation
document.getElementById('prevDay').addEventListener('click', () => {
  currentDate.setDate(currentDate.getDate() - 1);
  document.getElementById('currentDate').textContent = formatDate(currentDate);
  renderAll();
});

document.getElementById('nextDay').addEventListener('click', () => {
  currentDate.setDate(currentDate.getDate() + 1);
  document.getElementById('currentDate').textContent = formatDate(currentDate);
  renderAll();
});

document.getElementById('todayBtn').addEventListener('click', () => {
  currentDate = new Date();
  document.getElementById('currentDate').textContent = formatDate(currentDate);
  renderAll();
});

// Modal buttons
document.getElementById('saveBtn').addEventListener('click', saveActivity);
document.getElementById('cancelBtn').addEventListener('click', closeModal);
document.getElementById('deleteBtn').addEventListener('click', deleteActivity);
document.getElementById('exportBtn').addEventListener('click', exportData);
document.getElementById('importBtn').addEventListener('click', () => document.getElementById('importInput').click());
document.getElementById('importInput').addEventListener('change', (e) => {
  if (e.target.files[0]) importData(e.target.files[0]);
});
document.getElementById('clearBtn').addEventListener('click', clearToday);

document.getElementById('modal').addEventListener('click', (e) => {
  if (e.target.id === 'modal') closeModal();
});

// Login modal
document.getElementById('loginBtn').addEventListener('click', () => doLogin(document.getElementById('usernameInput').value));
document.getElementById('usernameInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') doLogin(e.target.value);
});

document.getElementById('userName').addEventListener('click', switchUser);

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') { closeModal(); hideLoginModal(); }
  if (e.key === 'Enter' && document.getElementById('modal').classList.contains('active')) {
    if (e.target.tagName !== 'TEXTAREA') saveActivity();
  }
});

// Init
document.getElementById('currentDate').textContent = formatDate(currentDate);
const savedUser = localStorage.getItem('tt_username');
if (savedUser && isValidUsername(savedUser)) {
  currentUser = savedUser;
  document.getElementById('userName').textContent = savedUser;
  connectToFirebase(savedUser);
} else {
  showLoginModal();
}
</script>
